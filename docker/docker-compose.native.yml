services:
  cli:
    image: ${TOKENASH_IMAGE:-ghcr.io/samirsengupta/tokenash:latest}
    entrypoint: ["tokenash"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      HOME: /tmp/tokenash-home
      # Canonical Tokenash filesystem contract (issue #175). Forwarded into
      # the container so the proxy resolves state/config to the bind-mounted
      # /tmp/tokenash-home/.tokenash path. TOKENASH_WORKSPACE (above) remains
      # the Docker bind-mount source and is intentionally different.
      TOKENASH_WORKSPACE_DIR: /tmp/tokenash-home/.tokenash
      TOKENASH_CONFIG_DIR: /tmp/tokenash-home/.tokenash/config
    volumes:
      - ${TOKENASH_WORKSPACE:-.}:/workspace
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.tokenash:/tmp/tokenash-home/.tokenash
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.claude:/tmp/tokenash-home/.claude
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.codex:/tmp/tokenash-home/.codex
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.gemini:/tmp/tokenash-home/.gemini
    command: ["--help"]

  proxy:
    image: ${TOKENASH_IMAGE:-ghcr.io/samirsengupta/tokenash:latest}
    entrypoint: ["tokenash", "proxy"]
    working_dir: /workspace
    restart: unless-stopped
    environment:
      HOME: /tmp/tokenash-home
      TOKENASH_HOST: 0.0.0.0
      # Canonical Tokenash filesystem contract (issue #175). See `cli` service
      # above for rationale.
      TOKENASH_WORKSPACE_DIR: /tmp/tokenash-home/.tokenash
      TOKENASH_CONFIG_DIR: /tmp/tokenash-home/.tokenash/config
    ports:
      - "${TOKENASH_PORT:-8787}:${TOKENASH_PORT:-8787}"
    volumes:
      - ${TOKENASH_WORKSPACE:-.}:/workspace
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.tokenash:/tmp/tokenash-home/.tokenash
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.claude:/tmp/tokenash-home/.claude
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.codex:/tmp/tokenash-home/.codex
      - ${TOKENASH_HOST_HOME:?set TOKENASH_HOST_HOME}/.gemini:/tmp/tokenash-home/.gemini
    command: ["--host", "0.0.0.0", "--port", "${TOKENASH_PORT:-8787}"]
