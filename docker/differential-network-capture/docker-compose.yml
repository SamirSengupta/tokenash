name: tokenash-network-diff

services:
  mitm-direct:
    image: mitmproxy/mitmproxy:12
    command:
      - mitmdump
      - --mode
      - regular
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - --set
      - confdir=/mitmproxy
      - -s
      - /capture/mitm_capture.py
    environment:
      CAPTURE_LANE: direct
      CAPTURE_OUTPUT: /captures/direct.jsonl
      CAPTURE_INCLUDE_HOSTS: ${CAPTURE_INCLUDE_HOSTS:-api.anthropic.com}
      CAPTURE_BODY_BYTES: ${CAPTURE_BODY_BYTES:-262144}
    volumes:
      - ./mitm_capture.py:/capture/mitm_capture.py:ro
      - ./captures:/captures
      - mitm_direct_ca:/mitmproxy
    ports:
      - "${DIRECT_MITM_PORT:-18080}:8080"

  mitm-tokenash-client:
    image: mitmproxy/mitmproxy:12
    command:
      - mitmdump
      - --mode
      - reverse:http://tokenash-proxy:8787
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - -s
      - /capture/mitm_capture.py
    environment:
      CAPTURE_LANE: tokenash-client
      CAPTURE_OUTPUT: /captures/tokenash-client.jsonl
      CAPTURE_INCLUDE_HOSTS: ${CAPTURE_CLIENT_INCLUDE_HOSTS:-mitm-tokenash-client,tokenash-proxy,api.anthropic.com}
      CAPTURE_BODY_BYTES: ${CAPTURE_BODY_BYTES:-262144}
    volumes:
      - ./mitm_capture.py:/capture/mitm_capture.py:ro
      - ./captures:/captures
    ports:
      - "${TOKENASH_CLIENT_MITM_PORT:-18082}:8080"
    depends_on:
      - tokenash-proxy

  mitm-tokenash-upstream:
    image: mitmproxy/mitmproxy:12
    command:
      - mitmdump
      - --mode
      - regular
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - --set
      - confdir=/mitmproxy
      - -s
      - /capture/mitm_capture.py
    environment:
      CAPTURE_LANE: tokenash-upstream
      CAPTURE_OUTPUT: /captures/tokenash-upstream.jsonl
      CAPTURE_INCLUDE_HOSTS: ${CAPTURE_INCLUDE_HOSTS:-api.anthropic.com}
      CAPTURE_BODY_BYTES: ${CAPTURE_BODY_BYTES:-262144}
    volumes:
      - ./mitm_capture.py:/capture/mitm_capture.py:ro
      - ./captures:/captures
      - mitm_tokenash_ca:/mitmproxy
    ports:
      - "${TOKENASH_MITM_PORT:-18081}:8080"

  tokenash-proxy:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["--host", "0.0.0.0", "--port", "8787", "--backend", "anthropic"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY}
      ANTHROPIC_TARGET_API_URL: ${ANTHROPIC_TARGET_API_URL:-https://api.anthropic.com}
      HTTPS_PROXY: http://mitm-tokenash-upstream:8080
      HTTP_PROXY: http://mitm-tokenash-upstream:8080
      NO_PROXY: 127.0.0.1,localhost,tokenash-proxy
      REQUESTS_CA_BUNDLE: /mitmproxy/mitmproxy-ca-cert.pem
      SSL_CERT_FILE: /mitmproxy/mitmproxy-ca-cert.pem
    volumes:
      - mitm_tokenash_ca:/mitmproxy:ro
    depends_on:
      - mitm-tokenash-upstream

  claude-direct:
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        CLAUDE_CODE_PACKAGE: ${CLAUDE_CODE_PACKAGE:-@anthropic-ai/claude-code}
    profiles: ["run"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY}
      HTTPS_PROXY: http://mitm-direct:8080
      HTTP_PROXY: http://mitm-direct:8080
      NO_PROXY: 127.0.0.1,localhost
      NODE_EXTRA_CA_CERTS: /mitmproxy/mitmproxy-ca-cert.pem
      SSL_CERT_FILE: /mitmproxy/mitmproxy-ca-cert.pem
      CLAUDE_LANE: direct
      CLAUDE_PROMPT: ${CLAUDE_PROMPT:-Summarize this repository in one sentence.}
      CLAUDE_ARGS: ${CLAUDE_DIRECT_ARGS:-}
    volumes:
      - ../..:/workspace:ro
      - mitm_direct_ca:/mitmproxy:ro
    depends_on:
      - mitm-direct

  claude-tokenash:
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        CLAUDE_CODE_PACKAGE: ${CLAUDE_CODE_PACKAGE:-@anthropic-ai/claude-code}
    profiles: ["run"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: http://mitm-tokenash-client:8080
      CLAUDE_LANE: tokenash
      CLAUDE_PROMPT: ${CLAUDE_PROMPT:-Summarize this repository in one sentence.}
      CLAUDE_ARGS: ${CLAUDE_TOKENASH_ARGS:-}
    volumes:
      - ../..:/workspace:ro
    depends_on:
      - mitm-tokenash-client

volumes:
  mitm_direct_ca:
  mitm_tokenash_ca:
